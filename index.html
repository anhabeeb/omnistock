<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="OmniStock warehouse inventory system with offline-first sync, realtime updates, and role-based operations."
    />
    <meta name="color-scheme" content="light dark" />
    <meta name="theme-color" content="#0f1b36" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Sora:wght@600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="/manifest.webmanifest" />
    <script>
      (() => {
        const storageKey = "omnistock-theme";
        const darkThemeColor = "#0b1730";
        const lightThemeColor = "#f4f7fd";

        try {
          const stored = window.localStorage.getItem(storageKey);
          const prefersDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
          const theme =
            stored === "light" || stored === "dark"
              ? stored
              : prefersDark
                ? "dark"
                : "light";

          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
          document
            .querySelector('meta[name="theme-color"]')
            ?.setAttribute("content", theme === "dark" ? darkThemeColor : lightThemeColor);
        } catch {
          document.documentElement.dataset.theme = "light";
          document.documentElement.style.colorScheme = "light";
        }
      })();
    </script>
    <title>OmniStock</title>
  </head>
  <body>
    <div id="root"></div>
    <script src="/vendor/html5-qrcode.min.js"></script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
