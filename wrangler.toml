name = "omnistock"
main = "./worker/index.ts"
compatibility_date = "2026-03-23"

[assets]
directory = "./dist/client"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = ["/api/*", "/ws*"]

[triggers]
crons = ["0 * * * *"]

[[durable_objects.bindings]]
name = "OMNISTOCK_HUB"
class_name = "OmniStockHub"

[[d1_databases]]
binding = "OMNISTOCK_DB"
database_name = "stock"
database_id = "c2211768-7a2c-441c-8507-9854112b6744"
migrations_dir = "./migrations"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["OmniStockHub"]
